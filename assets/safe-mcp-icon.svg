<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">Custom Safe MCP icon</title>
  <desc id="desc">A shielded terminal node network for safe automation.</desc>
  <defs>
    <linearGradient id="mcp-bg" x1="26" y1="23" x2="225" y2="232" gradientUnits="userSpaceOnUse">
      <stop stop-color="#60a5fa"/>
      <stop offset=".45" stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="mcp-shield" x1="78" y1="58" x2="184" y2="194" gradientUnits="userSpaceOnUse">
      <stop stop-color="#dbeafe"/>
      <stop offset=".45" stop-color="#67e8f9"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="mcp-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.4 0 0 0 0 0.65 0 0 0 0 1 0 0 0 .7 0"/>
      <feBlend in="SourceGraphic"/>
    </filter>
  </defs>
  <rect width="256" height="256" rx="58" fill="#050816"/>
