    <path d="M128 65 170 80v38c0 30-16 53-42 68-26-15-42-38-42-68V80l42-15Z" fill="url(#mcp-shield)"/>
    <path d="M105 124h46M105 105l20 19-20 19" fill="none" stroke="#08111f" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
