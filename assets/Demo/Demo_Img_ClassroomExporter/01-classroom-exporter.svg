<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" role="img" aria-labelledby="title desc">
  <title id="title">Classroom AI Exporter popup screenshot mockup</title>
  <desc id="desc">A Google Classroom inspired dashboard showing a local archive export popup.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1440" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#08111f"/>
      <stop offset="0.5" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#052e2b"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#22c55e"/>
      <stop offset="1" stop-color="#14b8a6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="28" stdDeviation="28" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1440" height="900" fill="url(#bg)"/>
  <circle cx="1160" cy="160" r="240" fill="#22c55e" opacity="0.12"/>
  <circle cx="230" cy="760" r="260" fill="#38bdf8" opacity="0.1"/>
  <g transform="translate(120 110)" filter="url(#shadow)">
    <rect width="820" height="590" rx="34" fill="#f8fafc"/>
    <rect width="820" height="120" rx="34" fill="url(#green)"/>
    <rect y="88" width="820" height="502" fill="#f8fafc"/>
    <circle cx="76" cy="60" r="24" fill="#dcfce7"/>
    <rect x="118" y="42" width="210" height="20" rx="10" fill="#ecfdf5"/>
    <rect x="42" y="158" width="300" height="360" rx="24" fill="#ffffff" stroke="#dbeafe"/>
    <rect x="384" y="158" width="394" height="82" rx="24" fill="#ecfdf5"/>
    <rect x="384" y="272" width="394" height="82" rx="24" fill="#f8fafc" stroke="#dbeafe"/>
    <rect x="384" y="386" width="394" height="82" rx="24" fill="#f8fafc" stroke="#dbeafe"/>
    <rect x="74" y="196" width="218" height="22" rx="11" fill="#111827"/>
    <rect x="74" y="238" width="156" height="14" rx="7" fill="#64748b"/>
    <rect x="74" y="286" width="214" height="12" rx="6" fill="#cbd5e1"/>
    <rect x="74" y="316" width="178" height="12" rx="6" fill="#cbd5e1"/>
    <rect x="74" y="402" width="188" height="50" rx="25" fill="#0f766e"/>
    <rect x="426" y="190" width="220" height="18" rx="9" fill="#0f172a"/>
    <rect x="426" y="306" width="260" height="16" rx="8" fill="#334155"/>
    <rect x="426" y="420" width="180" height="16" rx="8" fill="#334155"/>
  </g>
  <g transform="translate(830 190)" filter="url(#shadow)">
    <rect width="390" height="474" rx="34" fill="#0f172a" stroke="#334155"/>
    <rect x="30" y="30" width="68" height="68" rx="18" fill="#1f8da1"/>
    <path d="M48 52h36v36H48zM66 52v36" stroke="#d1fae5" stroke-width="4" fill="none"/>
    <path d="M83 42l12 12-12 12-12-12z" fill="#fde68a"/>
    <text x="118" y="60" fill="#e5e7eb" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800">Classroom AI Exporter</text>
    <text x="118" y="88" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="15">Local archive</text>
    <rect x="30" y="132" width="330" height="132" rx="24" fill="#111827" stroke="#334155"/>
    <text x="58" y="172" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800">Snapshot ready</text>
    <text x="58" y="206" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="15">3 attachment links found</text>
    <text x="58" y="234" fill="#38bdf8" font-family="Inter, Arial, sans-serif" font-size="14">Native host connected</text>
    <rect x="30" y="292" width="154" height="64" rx="18" fill="#1e293b"/>
    <rect x="202" y="292" width="158" height="64" rx="18" fill="url(#green)"/>
    <text x="65" y="331" fill="#e2e8f0" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">Export page</text>
    <text x="229" y="331" fill="#052e16" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="800">Export + download</text>
    <rect x="30" y="392" width="330" height="46" rx="14" fill="#020617" stroke="#1e293b"/>
    <text x="52" y="421" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="14">Archive root: ~/ClassroomAIArchive</text>
  </g>
