# This workflow fetches your GitHub data and caches it as a JSON file
# Runs daily at midnight UTC, or manually via workflow_dispatch
# Uses GH_PAT secret for authenticated requests (higher rate limits)

name: Update GitHub Data

on:
  schedule:
    - cron: '0 0 * * *'  # Daily at midnight UTC
    - cron: '0 12 * * *' # Also at noon UTC for fresher data
  workflow_dispatch:  # Allows manual trigger from Actions tab
    inputs:
      force_update:
        description: 'Force update even if no changes'
        required: false
        default: 'false'
        type: boolean
  push:
    branches: [main]
    paths:
      - '.github/workflows/update-github-data.yml'  # Re-run if workflow changes

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Create data directory
        run: mkdir -p data
      
      - name: Fetch GitHub data
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_PAT || secrets.GITHUB_API_TOKEN || secrets.PAT || secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          API_BASE="https://api.github.com"
          USERNAME="charlie2233"

          AUTH_HEADER=()
          if [ -n "${GH_TOKEN:-}" ]; then
            AUTH_HEADER=(-H "Authorization: token $GH_TOKEN")
            echo "Using authenticated GitHub API requests."
          else
            echo "No GH token configured; using unauthenticated GitHub API requests (lower rate limit)."
          fi

          # Fetch repositories
          curl -fsSL "${AUTH_HEADER[@]}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${API_BASE}/users/${USERNAME}/repos?sort=updated&per_page=100" \
            > data/github-repos.json

          # Fetch recent events (pushes, releases, etc.)
          for page in 1 2 3; do
            curl -fsSL "${AUTH_HEADER[@]}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "${API_BASE}/users/${USERNAME}/events/public?per_page=100&page=${page}" \
              > "data/_events_${page}.json" || echo "[]" > "data/_events_${page}.json"
          done

          python3 - <<'PY'
          import json
          from pathlib import Path

          events = []
          for page in (1, 2, 3):
              path = Path(f"data/_events_{page}.json")
              try:
                  data = json.loads(path.read_text(encoding="utf-8"))
                  if isinstance(data, list):
                      events.extend(data)
              except Exception:
                  pass
              try:
                  path.unlink()
              except Exception:
                  pass

          Path("data/github-events.json").write_text(json.dumps(events, indent=2) + "\n", encoding="utf-8")
          PY

          python3 - <<'PY'
          import datetime
          import json
          import os
          import time
          import urllib.request
          from pathlib import Path

          repos = json.loads(Path("data/github-repos.json").read_text(encoding="utf-8"))
          if not isinstance(repos, list):
              raise SystemExit(f"Expected list response, got: {type(repos).__name__}: {repos}")

          # Calculate stats
          total_stars = sum(r.get("stargazers_count", 0) for r in repos)
          total_forks = sum(r.get("forks_count", 0) for r in repos)
          languages = set(r.get("language") for r in repos if r.get("language"))
          
          # Get most recent push
          most_recent = None
          for r in repos:
              if r.get("pushed_at"):
                  if most_recent is None or r["pushed_at"] > most_recent:
                      most_recent = r["pushed_at"]

          meta = {
              "updatedAt": datetime.datetime.utcnow().replace(microsecond=0).isoformat() + "Z",
              "repoCount": len(repos),
              "totalStars": total_stars,
              "totalForks": total_forks,
              "languageCount": len(languages),
              "mostRecentPush": most_recent,
              "source": "github-actions-cache",
          }

          Path("data/github-meta.json").write_text(json.dumps(meta, indent=2) + "\n", encoding="utf-8")
          Path("data/last-updated.txt").write_text(meta["updatedAt"] + "\n", encoding="utf-8")

          # Weekly stats (commit contributions, PRs, etc.) via GitHub GraphQL.
          weekly_stats = {}
          token = os.environ.get("GH_TOKEN") or ""
          if token:
              try:
                  now = datetime.datetime.utcnow().replace(microsecond=0)
                  week_ago = now - datetime.timedelta(days=7)

                  query = """
                  query($login: String!, $from: DateTime!, $to: DateTime!) {
                    user(login: $login) {
                      contributionsCollection(from: $from, to: $to) {
                        totalCommitContributions
                        totalPullRequestContributions
                        totalIssueContributions
                        totalRepositoryContributions
                      }
                    }
                  }
                  """.strip()

                  payload = json.dumps({
                      "query": query,
                      "variables": {
                          "login": "charlie2233",
                          "from": week_ago.isoformat() + "Z",
                          "to": now.isoformat() + "Z",
                      }
                  }).encode("utf-8")

                  headers = {
                      "Accept": "application/vnd.github+json",
                      "User-Agent": "atrak-dev-site",
                      "Authorization": f"token {token}",
                  }

                  req = urllib.request.Request("https://api.github.com/graphql", data=payload, headers=headers)
                  with urllib.request.urlopen(req, timeout=30) as resp:
                      data = json.load(resp)

                  cc = (data or {}).get("data", {}).get("user", {}).get("contributionsCollection", {}) or {}
                  weekly_stats = {
                      "updatedAt": meta["updatedAt"],
                      "from": week_ago.isoformat() + "Z",
                      "to": now.isoformat() + "Z",
                      "totalCommitContributions": int(cc.get("totalCommitContributions") or 0),
                      "totalPullRequestContributions": int(cc.get("totalPullRequestContributions") or 0),
                      "totalIssueContributions": int(cc.get("totalIssueContributions") or 0),
                      "totalRepositoryContributions": int(cc.get("totalRepositoryContributions") or 0),
                  }
              except Exception as e:
                  print(f"Failed to fetch weekly GraphQL stats: {e}")

          Path("data/github-weekly.json").write_text(json.dumps(weekly_stats, indent=2) + "\n", encoding="utf-8")

          # Fetch recent releases across repos (for the website "Latest releases" UI)
          api_base = "https://api.github.com"
          headers = {
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28",
              "User-Agent": "atrak-dev-site",
          }
          if token:
              headers["Authorization"] = f"token {token}"

          def fetch_json(url: str):
              req = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(req, timeout=30) as resp:
                  return json.load(resp)

          candidates = [
              r for r in repos
              if isinstance(r, dict) and r.get("full_name") and not r.get("fork")
          ]
          candidates.sort(key=lambda r: r.get("pushed_at") or "", reverse=True)
          candidates = candidates[:30]

          releases = []
          for repo in candidates:
              full_name = repo.get("full_name")
              if not full_name:
                  continue
              try:
                  rels = fetch_json(f"{api_base}/repos/{full_name}/releases?per_page=5")
              except Exception as e:
                  print(f"Failed to fetch releases for {full_name}: {e}")
                  continue
              if not isinstance(rels, list):
                  continue
              for rel in rels:
                  if not isinstance(rel, dict):
                      continue
                  assets = []
                  for asset in rel.get("assets") or []:
                      if not isinstance(asset, dict):
                          continue
                      assets.append({
                          "name": asset.get("name") or "",
                          "download_url": asset.get("browser_download_url") or "",
                          "size": int(asset.get("size") or 0),
                          "download_count": int(asset.get("download_count") or 0),
                      })
                  releases.append({
                      "repo": full_name,
                      "name": rel.get("name") or "",
                      "tag": rel.get("tag_name") or "",
                      "url": rel.get("html_url") or "",
                      "published_at": rel.get("published_at") or "",
                      "draft": bool(rel.get("draft")),
                      "prerelease": bool(rel.get("prerelease")),
                      "zipball_url": rel.get("zipball_url") or "",
                      "tarball_url": rel.get("tarball_url") or "",
                      "assets": assets,
                  })

          releases.sort(key=lambda r: r.get("published_at") or "", reverse=True)
          Path("data/github-releases.json").write_text(json.dumps(releases, indent=2) + "\n", encoding="utf-8")

          print(f"Repos fetched: {len(repos)}")
          print(f"Total stars: {total_stars}")
          print(f"Languages: {len(languages)}")
          print(f"Updated at (UTC): {meta['updatedAt']}")
          print(f"Releases fetched: {len(releases)}")
          PY
      
      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update GitHub data [skip ci]"
            git push
          fi
